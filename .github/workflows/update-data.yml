name: Monthly Data Pipeline

on:
  schedule:
    - cron: "0 18 1 * *"  # 1st of each month at 18:00 UTC (02:00 SGT next day)

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual run"

permissions:
  contents: write

jobs:
  update-data:
    name: Fetch, Process, Train, and Commit
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: python run_pipeline.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit and push updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add \
            data/processed/resale_processed.csv \
            data/reference/block_coords.json \
            data/reference/mrt_stations.json \
            "models/*.joblib"

          if git diff --cached --quiet; then
            echo "No changes detected — nothing to commit."
          else
            RUN_DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore(data): monthly pipeline update ${RUN_DATE} [skip ci]"
            git push origin main
            echo "Changes committed and pushed."
          fi
