name: Monthly Data Pipeline

on:
  # 1st of each month at 18:00 UTC = 02:00 SGT (UTC+8)
  schedule:
    - cron: "0 18 28-31 * *"  # Last few days of the month — see note below
  # NOTE: GitHub's cron does not support "last day of month" or "1st at 18:00 UTC
  # which is 02:00 SGT the next day". The cleanest equivalent is to run on the
  # 28th–31st and check inside the job, OR simply use the schedule below which
  # fires on the last day at 18:00 UTC (= 1st of next month 02:00 SGT).
  #
  # To run on the 1st of each month at 02:00 SGT (= last day of prev month 18:00 UTC):
  # Replace the schedule block above with:
  #   - cron: "0 18 28-31 * *"
  # and add the date-gate step inside the job (already included below).
  #
  # Simpler alternative — run directly on 1st at 18:00 UTC (= 2am SGT next day, off by one):
  #   - cron: "0 18 1 * *"
  # Uncomment the line below and remove the 28-31 schedule if you prefer this:
  # schedule:
  #   - cron: "0 18 1 * *"

  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual trigger"
        required: false
        default: "Manual run"

permissions:
  contents: write

jobs:
  update-data:
    name: Fetch, Process, Train, and Commit
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ------------------------------------------------------------------ #
      # Date gate: only proceed when the schedule fires on the 28th–31st    #
      # AND it is actually the last day of the month (so the next day is    #
      # the 1st). On workflow_dispatch we always proceed.                   #
      # ------------------------------------------------------------------ #
      - name: Check date gate (last-day-of-month guard)
        id: date_gate
        run: |
          # Skip the date gate for manual runs
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — skipping date gate."
            exit 0
          fi

          # Tomorrow's date in UTC
          TOMORROW=$(date -u -d "+1 day" +%d)
          if [ "$TOMORROW" = "01" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Today is the last day of the month — proceeding."
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Today is NOT the last day of the month — skipping pipeline."
          fi

      - name: Checkout repository
        if: steps.date_gate.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          # Use GITHUB_TOKEN so the subsequent git push is authenticated.
          # For private repos or if default token push is blocked by branch
          # protection, replace with a PAT stored as a repository secret:
          #   token: ${{ secrets.PAT_PUSH }}
          token: ${{ secrets.GITHUB_TOKEN }}
          # Fetch the full history so git operations work correctly.
          fetch-depth: 0

      - name: Set up Python 3.11
        if: steps.date_gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.date_gate.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ------------------------------------------------------------------ #
      # Run the full pipeline                                               #
      # ------------------------------------------------------------------ #
      - name: Run data pipeline
        if: steps.date_gate.outputs.skip != 'true'
        id: pipeline
        run: python run_pipeline.py
        env:
          # Ensure unbuffered Python output so logs appear in real time.
          PYTHONUNBUFFERED: "1"
          # Add any API keys here if the pipeline requires them, e.g.:
          # ONEMAP_TOKEN: ${{ secrets.ONEMAP_TOKEN }}

      # ------------------------------------------------------------------ #
      # Commit changed artefacts back to main                               #
      # Only the specific files managed by the pipeline are considered;     #
      # this avoids accidentally committing unrelated changes.              #
      # ------------------------------------------------------------------ #
      - name: Commit and push updated data files
        if: steps.date_gate.outputs.skip != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only the pipeline-managed artefacts.
          git add \
            data/processed/resale_processed.csv \
            data/reference/block_coords.json \
            data/reference/mrt_stations.json \
            "models/*.joblib"

          # Check if there is anything new to commit.
          if git diff --cached --quiet; then
            echo "No changes detected — nothing to commit."
          else
            RUN_DATE=$(date -u +"%Y-%m-%d")
            git commit -m "chore(data): monthly pipeline update ${RUN_DATE} [skip ci]"
            git push origin main
            echo "Changes committed and pushed."
          fi
